{% extends "agri_app/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="fas fa-seedling me-2"></i>List Crop for Sale</h4>
                </div>
                <div class="card-body p-4">

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }}

                                {% if field.errors %}
                                    <div class="text-danger small mt-1">
                                        {{ field.errors.0 }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mt-4">
                            Publish to Marketplace
                        </button>
                    </form>

                </div>
            </div>
        <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
    <h4 class="mb-0"><i class="fas fa-seedling me-2"></i>List Crop for Sale</h4>

    <a href="{% url 'market_list' %}" class="btn btn-sm btn-light text-primary fw-bold">
        <i class="fas fa-store me-1"></i> View Marketplace
    </a>
</div>
        </div>
    </div>
</div>
{% endblock %}
