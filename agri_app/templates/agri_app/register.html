<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Smart | Join Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2e7d32;
            --accent-green: #79d70f;
            --bg-light: #f0f7f0;
        }

        body {
            background: linear-gradient(135deg, #f0f7f0 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }

        .register-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 50px;
            position: relative;
            overflow: hidden;
        }

        /* Top decorative bar */
        .register-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-green));
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-header h1 {
            color: var(--primary-green);
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 700;
            color: #333;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        /* Django Form Customization */
        form p {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.05);
        }

        .btn-register {
            background: var(--primary-green);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-register:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.95rem;
        }

        .login-footer a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 700;
        }

        .helptext {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="brand-header">
            <h1>Agri<span>Smart</span></h1>
            <p class="text-muted">Join the community of smart farmers and buyers</p>
        </div>

        <h2>Create Your Account</h2>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger py-2 px-3 mb-4" style="font-size: 0.85rem; border-radius: 10px;">
                    Please correct the errors below.
                </div>
            {% endif %}

            {{ form.as_p }}

            <button type="submit" class="btn-register">Start Your Journey</button>
        </form>

        <div class="login-footer">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>

</body>
</html>
