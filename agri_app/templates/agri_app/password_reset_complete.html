{% extends "agri_app/base.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="card shadow-sm border-0 p-5 rounded-4 mx-auto" style="max-width: 500px;">
        <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
        <h3 class="fw-bold text-dark">Password reset complete</h3>
        <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
        <a href="{% url 'login' %}" class="btn btn-success fw-bold px-4 mt-3">Log In</a>
    </div>
</div>
{% endblock %}
