{% extends "agri_app/base.html" %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4 p-4">
                <h3 class="fw-bold text-success mb-4"><i class="fas fa-bullhorn me-2"></i>Broadcast Market News</h3>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success fw-bold w-50">Publish News</button>
                        <a href="{% url 'news_list' %}" class="btn btn-outline-secondary fw-bold w-50">Cancel</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
