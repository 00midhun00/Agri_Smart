{% extends "agri_app/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 p-4 rounded-4">
                <h3 class="fw-bold text-success mb-3">Reset Password</h3>
                <p class="text-muted">Enter your email address below, and we'll email instructions for setting a new one.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
