{% extends "agri_app/base.html" %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-warning text-dark py-3 d-flex justify-content-between align-items-center">
                    <h4 class="mb-0 fw-bold"><i class="fas fa-tractor me-2"></i>List Equipment for Rent</h4>
                    <a href="{% url 'rental_list' %}" class="btn btn-sm btn-light fw-bold">Cancel</a>
                </div>
                <div class="card-body p-4">

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Equipment Name</label>
                            {{ form.name }}
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Rate per Hour (₹)</label>
                                {{ form.rate_per_hour }}
                                <small class="text-muted">Leave blank if not applicable.</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Rate per Day (₹)</label>
                                {{ form.rate_per_day }}
                                <small class="text-muted">Leave blank if not applicable.</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            {{ form.description }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Equipment Image</label>
                            {{ form.image }}
                        </div>

                        <button type="submit" class="btn btn-warning w-100 py-3 fw-bold text-dark fs-5 shadow-sm">
                            <i class="fas fa-upload me-2"></i>Publish Rental Listing
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
