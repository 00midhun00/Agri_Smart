{% extends "agri_app/base.html" %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-danger"><i class="fas fa-bell me-2"></i>Your Notifications</h3>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
            </div>

            <div class="list-group shadow-sm">
                {% for alert in alerts %}
                    <div class="list-group-item list-group-item-action p-4 {% if not alert.is_read %}bg-light border-start border-danger border-4{% endif %}">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 fw-bold text-dark">{{ alert.message }}</h6>
                            <small class="text-muted">{{ alert.created_at|timesince }} ago</small>
                        </div>
                        {% if not alert.is_read %}
                            <span class="badge bg-danger mt-2">New</span>
                        {% endif %}
                    </div>
                {% empty %}
                    <div class="text-center py-5 bg-white border rounded">
                        <i class="fas fa-envelope-open fa-3x text-muted mb-3"></i>
                        <h5 class="text-muted">You have no new notifications.</h5>
                    </div>
                {% endfor %}
            </div>

        </div>
    </div>
</div>
{% endblock %}
